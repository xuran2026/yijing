<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>访客统计 — 伏羲三维心法</title>
<style>
  :root {
    --bg: #f5f0e8;
    --card: #fffef9;
    --text: #3d3226;
    --text-light: #6b5e4e;
    --accent: #8b4513;
    --accent-light: #b8860b;
    --border: #d4c5a9;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Noto Serif SC", "Source Han Serif SC", serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 40px 48px; text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06); max-width: 400px; width: 90%;
  }
  .card h1 { font-size: 1rem; color: var(--accent); margin-bottom: 28px; font-weight: 500; }
  .count {
    font-size: 4rem; font-weight: 700; color: var(--accent);
    line-height: 1; margin-bottom: 8px; font-family: "Georgia", serif;
  }
  .label { font-size: 0.88rem; color: var(--text-light); margin-bottom: 24px; }
  hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  .stats-row { display: flex; justify-content: center; gap: 32px; font-size: 0.82rem; color: var(--text-light); }
  .stats-row strong { display: block; font-size: 1.3rem; color: var(--text); }
  .back { display: inline-block; margin-top: 20px; color: var(--accent); text-decoration: none; font-size: 0.85rem; }
  .back:hover { text-decoration: underline; }
  .loading { color: var(--text-light); font-style: italic; }
  .error { color: #c0392b; font-size: 0.85rem; }
</style>
</head>
<body>
<div class="card">
  <h1>☯️ 伏羲三维心法 · 访客统计</h1>
  <div class="count" id="count">--</div>
  <div class="label" id="label">加载中...</div>
  <hr>
  <div class="stats-row">
    <div>今日<span><strong id="todayCount">--</strong></span></div>
    <div>总计<span><strong id="totalCount">--</strong></span></div>
  </div>
  <a class="back" href="./index.html">← 返回首页</a>
</div>

<script>
(function() {
  var namespace = 'yijing-xinfa-v1';
  var key = 'visitors';
  var apiBase = 'https://api.countapi.xyz';

  var countEl = document.getElementById('count');
  var labelEl = document.getElementById('label');
  var todayEl = document.getElementById('todayCount');
  var totalEl = document.getElementById('totalCount');

  function showError(msg) {
    countEl.textContent = '?';
    labelEl.textContent = msg;
    labelEl.className = 'label error';
  }

  // 获取总计数
  fetch(apiBase + '/get/' + namespace + '/' + key)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var total = data.value || 0;
      countEl.textContent = total.toLocaleString();
      labelEl.textContent = '累计访客';
      totalEl.textContent = total.toLocaleString();
    })
    .catch(function() {
      // 回退：读本地
      var local = 0;
      try { local = parseInt(localStorage.getItem('yijing_visitor_local')) || 0; } catch(e) {}
      countEl.textContent = local.toLocaleString();
      labelEl.textContent = '本地统计（API 不可达）';
      totalEl.textContent = local.toLocaleString();
    });

  // 今日计数（单独 namespace）
  var today = new Date().toISOString().slice(0,10).replace(/-/g,'');
  fetch(apiBase + '/get/' + namespace + '-daily-' + today + '/' + key)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      todayEl.textContent = (data.value || 0).toLocaleString();
    })
    .catch(function() {
      todayEl.textContent = '--';
    });
})();
</script>
</body>
</html>
